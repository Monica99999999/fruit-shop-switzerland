  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {

      background: #fef9f3; color: #333; min-height: 100vh;

    header {
      position: sticky; top: 0; z-index: 100;
      background: linear-gradient(135deg, #1565c0, #1e88e5);

    .logo span { font-size: 11px; font-weight: 400; opacity: .85; display: block; }
    .header-right { display: flex; align-items: center; gap: 8px; }
    .lang-btn {
      background: rgba(255,255,255,0.25); border: 1.5px solid rgba(255,255,255,0.6);
      color: #fff; border-radius: 16px; padding: 5px 11px;
      font-size: 12px; cursor: pointer; font-weight: 600;
      backdrop-filter: blur(4px);
    }
    .cart-btn {
      background: linear-gradient(135deg, #e65100, #ff9800);
      border: 2px solid #fff;

    .cart-count {
      background: #1565c0; color: #fff; border-radius: 50%; width: 20px; height: 20px;
      font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 1px 4px rgba(21,101,192,0.5);
    }
    .hero {
      background: linear-gradient(145deg, #e3f2fd, #bbdefb); margin: 12px 12px 0;
      border-radius: 16px; padding: 24px 18px;
      display: flex; align-items: center; justify-content: space-between;

    .hero-text h2 { font-size: 22px; color: #0d47a1; font-weight: 800; line-height: 1.3; }
    .hero-text p { font-size: 12px; color: #1565c0; margin-top: 6px; line-height: 1.5; }
    .hero-btn {

    .hero-emoji { font-size: 60px; line-height: 1; }
    .features { display: flex; gap: 0; background: #fff; margin: 12px 12px 0;

    .feat-item strong { display: block; font-size: 11px; color: #1565c0; margin-bottom: 2px; }

    .products { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 4px 12px 20px; }
    .card { background: #fff; border-radius: 14px; overflow: hidden;

    .card:active { transform: scale(0.97); }

    .card-name { font-size: 13px; font-weight: 600; color: #222; line-height: 1.3; }
    .card-desc { font-size: 10px; color: #999; margin-top: 3px; line-height: 1.4; }
    .card-tag { display: inline-block; background: #e3f2fd; color: #1565c0; border-radius: 8px;

    .card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }

    .add-btn {

      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 8px rgba(21,101,192,0.4);
    }
    .cart-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: none; }
    .cart-overlay.open { display: block; }
    .cart-panel {
      position: fixed; right: 0; top: 0; bottom: 0; width: min(92vw, 400px);
      background: #fff; z-index: 201; transform: translateX(100%); transition: transform .3s ease;
      display: flex; flex-direction: column;

    .cart-panel.open { transform: translateX(0); }
    .cart-header { background: linear-gradient(135deg, #1565c0, #1e88e5); color: #fff;

    .cart-items { flex: 1; overflow-y: auto; padding: 12px; }

    .ci-emoji { font-size: 32px; }

    .ci-name { font-size: 13px; font-weight: 600; }
    .ci-price { font-size: 12px; color: #e65100; margin-top: 2px; }
    .ci-ctrl { display: flex; align-items: center; gap: 6px; }

    .ci-qty { font-size: 14px; font-weight: 600; min-width: 18px; text-align: center; }
    .cart-footer { padding: 12px; border-top: 1px solid #f0f0f0; }
    .cart-total { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .cart-total span { font-size: 14px; color: #666; }
    .cart-total strong { font-size: 20px; color: #e65100; font-weight: 800; }
    .checkout-btn {
      width: 100%; background: linear-gradient(135deg, #1565c0, #1e88e5);
      color: #fff; border: none; border-radius: 24px; padding: 14px;
      font-size: 16px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 16px rgba(21,101,192,0.4);
    }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; display: none; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .checkout-modal { background: #fff; border-radius: 20px; padding: 24px 18px; width: min(92vw, 380px); animation: popIn .3s ease; }
    @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .cm-header { text-align: center; margin-bottom: 18px; }
    .cm-header .icon { font-size: 48px; }
    .cm-header h3 { font-size: 18px; font-weight: 700; color: #333; margin-top: 6px; }
    .cm-header p { font-size: 12px; color: #888; margin-top: 4px; }
    .pay-options { display: flex; flex-direction: column; gap: 10px; }
    .pay-card {
      display: flex; align-items: center; gap: 12px; border: 2px solid #e0e0e0;
      border-radius: 14px; padding: 14px 14px; cursor: pointer; transition: all .2s;
    }
    .pay-card:active { transform: scale(0.98); }
    .pay-card.paypal { border-color: #003087; background: #f5f8ff; }
    .pay-card.paypal:hover { box-shadow: 0 2px 12px rgba(0,48,135,0.2); }
    .pay-card.whatsapp { border-color: #25d366; background: #f0fdf4; }

    .pay-card.invoice { border-color: #ff9800; background: #fff8f0; }
    .pay-card.invoice:hover { box-shadow: 0 2px 12px rgba(255,152,0,0.2); }
    .pay-icon { font-size: 32px; flex-shrink: 0; }
    .pay-info { flex: 1; }
    .pay-info strong { display: block; font-size: 14px; color: #333; }
    .pay-info span { font-size: 11px; color: #888; display: block; margin-top: 2px; }
    .pay-arrow { font-size: 18px; color: #bbb; }
    .cm-close { display: block; margin: 16px auto 0; background: none; border: none; color: #999; font-size: 13px; cursor: pointer; }
    .success-modal { background: #fff; border-radius: 20px; padding: 28px 22px; width: min(88vw, 320px); text-align: center; animation: popIn .3s ease; }
    .success-modal .icon { font-size: 56px; margin-bottom: 10px; }
    .success-modal h3 { font-size: 18px; font-weight: 700; color: #333; }
    .success-modal p { font-size: 13px; color: #888; margin-top: 7px; line-height: 1.6; }
    .success-btn { margin-top: 18px; background: linear-gradient(135deg, #1565c0, #1e88e5); color: #fff; border: none; border-radius: 20px; padding: 11px 32px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .wa-float {
      position: fixed; bottom: 20px; right: 16px; z-index: 150;
      width: 56px; height: 56px; border-radius: 50%; background: #25d366; color: #fff; border: none;
      font-size: 30px; cursor: pointer; box-shadow: 0 4px 20px rgba(37,211,102,0.5);
      display: flex; align-items: center; justify-content: center; transition: transform .2s;
    }
    .wa-float:active { transform: scale(0.9); }
    .wa-float::after {
      content: ''; position: absolute; inset: -4px; border-radius: 50%;
      border: 2px solid #25d366; animation: waPulse 2s infinite;
    }
    @keyframes waPulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.3); opacity: 0; } 100% { transform: scale(1); opacity: 0; } }
    .wa-tooltip {
      position: absolute; right: 64px; top: 50%; transform: translateY(-50%);
      background: #333; color: #fff; font-size: 11px; white-space: nowrap;
      padding: 6px 12px; border-radius: 14px; pointer-events: none; opacity: 0; transition: opacity .3s;
    }
    .wa-float:hover .wa-tooltip { opacity: 1; }
    .social-section { margin: 0 12px 16px; background: #fff; border-radius: 14px; padding: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .social-title { font-size: 14px; font-weight: 700; color: #333; margin-bottom: 10px; }
    .social-btns { display: flex; flex-wrap: wrap; gap: 8px; }
    .fb-btn {
      display: inline-flex; align-items: center; gap: 6px; background: #1877f2; color: #fff;
      border: none; border-radius: 20px; padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .ig-btn {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af); color: #fff;
      border: none; border-radius: 20px; padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    .wa-btn-social {
      display: inline-flex; align-items: center; gap: 6px; background: #25d366; color: #fff;
      border: none; border-radius: 20px; padding: 9px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    footer { text-align: center; padding: 20px 12px; font-size: 11px; color: #ccc; border-top: 1px solid #f0f0f0; background: #fafafa; }
    .footer-links { margin-top: 8px; }
    .footer-links a { color: #1565c0; text-decoration: none; margin: 0 6px; font-size: 12px; }
    .lang-dropdown {
      position: absolute; top: 44px; right: 60px; background: #fff; border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15); overflow: hidden; z-index: 150; display: none;
    }
    .lang-dropdown.open { display: block; }
    .lang-opt { padding: 10px 22px; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
    .lang-opt:hover { background: #e3f2fd; }
    .lang-opt.active { background: #bbdefb; font-weight: 600; }
  </style>
</head>
<body>

<!-- Header -->
<header style="position:relative;">
  <div class="logo">
    🍎 FreshFruit
    <span data-i18n="tagline" data-zh="精选水果 · 瑞士直送"></span>
  </div>
  <div class="header-right">

  <div class="lang-dropdown" id="langDropdown">

<!-- Hero -->
<div class="hero">

全瑞士配送 🇨🇭"></p>

  </div>
  <div class="hero-emoji">🍊🍇🍓</div>
</div>

<!-- Features -->
<div class="features">
  <div class="feat-item">
    <span class="feat-icon">🚚</span>
    <strong data-i18n="feat1_title" data-zh="极速配送"></strong>
    <span data-i18n="feat1_desc" data-zh="24小时"></span>
  </div>
  <div class="feat-item">

<!-- Categories -->

<div class="categories">

    tagline: "Premium Fruits · Delivered in Switzerland",

let currentLang = 'en';

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('ff_lang', lang);
  document.getElementById('htmlRoot').lang = lang === 'de' ? 'de' : lang === 'fr' ? 'fr' : lang === 'zh' ? 'zh' : 'en';
  document.getElementById('currentLangLabel').textContent = lang.toUpperCase();

  // Update [data-i18n] elements
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    let val = null;
    if (lang === 'zh') {
      val = el.getAttribute('data-zh');
    } else if (t[lang] && t[lang][key]) {
      val = t[lang][key];
    }
    if (val) {
      el.innerHTML = val.replace(/\n/g, '<br>');
    }
  });

  // Update lang dropdown active state
  document.querySelectorAll('.lang-opt').forEach(opt => {
    opt.classList.toggle('active', opt.getAttribute('onclick') === `setLang('${lang}')`);
  });

  renderProducts(currentCat);
  renderCart();
  document.getElementById('langDropdown').classList.remove('open');
}

function toggleLangMenu() {
  document.getElementById('langDropdown').classList.toggle('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('#langToggle') && !e.target.closest('#langDropdown')) {
    document.getElementById('langDropdown').classList.remove('open');
  }
});

let cart = {};
let currentCat = 'all';

const emojis = ['🍎','🍓','🥭','🫐','🟡','🍊','🍒','🐉','🔴','🎁','🧺','🟣'];

function getProductInfo(id) {
  if (currentLang === 'zh') {
    return zhProducts[id - 1];
  }
  const p = productPrices.find(x => x.id === id);
  const d = t[currentLang].products ? t[currentLang].products[id - 1] : null;
  return { ...p, ...d };
}

function renderProducts(cat) {
  const grid = document.getElementById('productGrid');
  if (currentLang === 'zh') {
    const list = cat === 'all' ? zhProducts : zhProducts.filter(p => p.cat === cat);
    grid.innerHTML = list.map(p => {
      const price = productPrices.find(x => x.id === p.id);
      return `
      <div class="card">
        <div class="card-img">${emojis[p.id-1]}</div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-tag">${p.tag}</div>
          <div class="card-footer">
            <div class="card-price">
              CHF ${price.price.toFixed(2)}
              <span class="card-unit">/${price.unit}</span>
            </div>
            <button class="add-btn" onclick="addToCart(${p.id})">+</button>
          </div>
        </div>
      </div>`;
    }).join('');
    return;
  }
  const allProducts = t[currentLang].products ? t[currentLang].products.map((p,i) => ({...p, id: i+1})) : [];
  const list = cat === 'all' ? allProducts : allProducts.filter(p => p.cat === cat);
  grid.innerHTML = list.map(p => {
    const price = productPrices.find(x => x.id === p.id);
    return `
      <div class="card">
        <div class="card-img">${emojis[p.id-1]}</div>
        <div class="card-body">
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="card-tag">${p.tag}</div>
          <div class="card-footer">
            <div class="card-price">
              CHF ${price.price.toFixed(2)}
              <span class="card-unit">/${price.unit}</span>
            </div>
            <button class="add-btn" onclick="addToCart(${p.id})">+</button>
          </div>
        </div>
      </div>`;
  }).join('');
}

function filterCat(el, cat) {
  document.querySelectorAll('.cat-tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentCat = cat;
  renderProducts(cat);
}

function addToCart(id) {
  cart[id] = (cart[id] || 0) + 1;
  updateCartBadge();
}

function removeFromCart(id) {
  if (cart[id] > 1) cart[id]--;
  else delete cart[id];
  renderCart(); updateCartBadge();
}

function updateCartBadge() {
  document.getElementById('cartCount').textContent = Object.values(cart).reduce((a,b)=>a+b,0);
}

function getCartTotal() {
  return Object.keys(cart).reduce((sum, id) => {
    const p = productPrices.find(x => x.id == id);
    return sum + p.price * cart[id];
  }, 0);
}

function buildOrderSummary() {
  return Object.keys(cart).map(id => {
    const p = getProductInfo(Number(id));
    return `• ${p.name} ×${cart[id]} — CHF ${(p.price * cart[id]).toFixed(2)}`;
  }).join('\n');
}

function renderCart() {
  const el = document.getElementById('cartItems');
  const ids = Object.keys(cart);
  if (ids.length === 0) {
    el.innerHTML = `<div class="empty-cart"><span>🛒</span>${t[currentLang].empty_cart.replace(/\n/g,'<br>')}</div>`;
    document.getElementById('cartTotal').textContent = 'CHF 0.00';
    return;
  }
  let total = 0;
  el.innerHTML = ids.map(id => {
    const p = getProductInfo(Number(id));
    const subtotal = p.price * cart[id];
    total += subtotal;
    return `
      <div class="cart-item">
        <div class="ci-emoji">${emojis[p.id-1]}</div>
        <div class="ci-info">
          <div class="ci-name">${p.name}</div>
          <div class="ci-price">CHF ${p.price.toFixed(2)}/${p.unit} × ${cart[id]} = CHF ${subtotal.toFixed(2)}</div>
        </div>
        <div class="ci-ctrl">
          <button class="ci-btn" onclick="removeFromCart(${p.id})">−</button>
          <span class="ci-qty">${cart[id]}</span>
          <button class="ci-btn" onclick="addToCart(${p.id});renderCart()">+</button>
        </div>
      </div>`;
  }).join('');
  document.getElementById('cartTotal').textContent = 'CHF ' + total.toFixed(2);
}

function openCart() {
  renderCart();
  document.getElementById('cartOverlay').classList.add('open');
  document.getElementById('cartPanel').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeCart() {
  document.getElementById('cartOverlay').classList.remove('open');
  document.getElementById('cartPanel').classList.remove('open');
  document.body.style.overflow = '';
}

// ===== Checkout =====
function checkout() {
  if (!Object.keys(cart).length) { alert(t[currentLang].empty_cart.replace(/\n/g, ' ')); return; }
  closeCart();
  document.getElementById('paymentModal').classList.add('open');
}
function closePaymentModal() {
  document.getElementById('paymentModal').classList.remove('open');
}

// ===== PayPal =====
function payWithPayPal() {
  document.getElementById('paymentModal').classList.remove('open');
  const total = getCartTotal().toFixed(2);
  const items = Object.keys(cart).map(id => {
    const p = getProductInfo(Number(id));
    return `${p.name} × ${cart[id]}`;
  }).join(', ');
  const paypalURL = 'https://www.paypal.com/cgi-bin/webscr'
    + '?cmd=_cart&upload=1'
    + '&business=' + encodeURIComponent(SHOP_CONFIG.paypalEmail)
    + '&currency_code=' + SHOP_CONFIG.currency
    + '&item_name_1=' + encodeURIComponent('FreshFruit Order: ' + items)
    + '&amount_1=' + total
    + '&return=' + encodeURIComponent(window.location.href)
    + '&cancel_return=' + encodeURIComponent(window.location.href);

  document.getElementById('successIcon').textContent = '🅿️';
  document.getElementById('successTitle').textContent = t[currentLang].paypal_success_title;
  document.getElementById('successDesc').textContent = t[currentLang].paypal_success_desc;
  document.getElementById('successModal').classList.add('open');

  setTimeout(() => { window.open(paypalURL, '_blank'); }, 1500);
}

// ===== WhatsApp (ALWAYS send in French to merchant) =====
function payWithWhatsApp() {
  document.getElementById('paymentModal').classList.remove('open');
  const total = getCartTotal().toFixed(2);
  const orderSummary = buildOrderSummary();
  let message = t.fr.wa_message
    .replace('{items}', orderSummary)
    .replace('{total}', total);
  const waURL = 'https://wa.me/' + SHOP_CONFIG.whatsappNumber + '?text=' + encodeURIComponent(message);

  document.getElementById('successIcon').textContent = '💬';
  document.getElementById('successTitle').textContent = t[currentLang].wa_success_title;
  document.getElementById('successDesc').textContent = t[currentLang].wa_success_desc;
  document.getElementById('successModal').classList.add('open');

  setTimeout(() => { window.open(waURL, '_blank'); }, 1500);
}

function openWhatsApp() {
  const greeting = t.fr.wa_message
    .replace('{items}', '')
    .replace('{total}', '0.00')
    .replace(/\n\nTotal: CHF 0\.00\n\n/, '\n\n')
    .replace(/\n\n\n+/g, '\n\n')
    .trim();
  const waURL = 'https://wa.me/' + SHOP_CONFIG.whatsappNumber + '?text=' + encodeURIComponent(greeting);
  window.open(waURL, '_blank');
}

// ===== Facebook Messenger =====
function openFacebookMessenger() {
  // 所有社交媒体按钮统一跳转到 WhatsApp
  openWhatsApp();
}

// ===== Instagram DM =====
function openInstagramDM() {
  // 所有社交媒体按钮统一跳转到 WhatsApp
  openWhatsApp();
}

// ===== Invoice =====
function payWithInvoice() {
  document.getElementById('paymentModal').classList.remove('open');
  document.getElementById('successIcon').textContent = '📄';
  document.getElementById('successTitle').textContent = t[currentLang].invoice_success_title;
  document.getElementById('successDesc').textContent = t[currentLang].invoice_success_desc;
  document.getElementById('successModal').classList.add('open');
}

function closeModal() {
  document.getElementById('successModal').classList.remove('open');
  cart = {};
  updateCartBadge();
}

// ===== Init =====
const savedLang = localStorage.getItem('ff_lang');
if (['en','de','fr','zh'].includes(savedLang)) {
  setLang(savedLang);
} else {
  renderProducts('all');
  // Set English defaults
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t.en[key]) el.innerHTML = t.en[key].replace(/\n/g, '<br>');
  });
}
</script>
